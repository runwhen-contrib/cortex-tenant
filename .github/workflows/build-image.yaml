name: Build and Push Cortex-Tenant Image
on:
  push:

# Taken from the google cloud starter workflow, but needs to be refactored to support flux.
# This might work well if we have flux ignore image tags. 

env:
  PROJECT_ID: project-468-304505
  BETA_PROJECT_ID: runwhen-nonprod-beta
  IMAGE: cortex-tenant

permissions:
    contents: 'read'
    id-token: 'write'

jobs:
  build-and-push-to-gcr:
    runs-on: ubuntu-latest
    outputs:
      image_path: ${{ steps.publish.outputs.image_path }}
    steps:
      - uses: actions/checkout@v2

      - id: 'auth-project-468'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v0.4.0'
        with:
            credentials_json: ${{ secrets.GCLOUD_SERVICE_KEY }}

      - name: Configure docker for GCP
        run: gcloud --quiet auth configure-docker
      
      - name: Set tag to branch name
        run: |-
          echo "TAG=$(echo $GITHUB_REF_NAME | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_ENV

    # Build the Docker image
      - name: Build
        run: |-
          docker build \
            --tag "gcr.io/$GCP_PROJECT/$IMAGE:$TAG" \
            --build-arg GITHUB_SHA="$GITHUB_SHA" \
            --build-arg GITHUB_REF="$GITHUB_REF" \
            -f Dockerfile .           

      - name: Configure docker for GCP
        run: gcloud --quiet auth configure-docker

      # Push the Docker image to BETA Google Container Registry
      - name: Publish DEV
        id: publish-beta
        run: |-
          docker push "gcr.io/$GCP_PROJECT/$IMAGE:$TAG"
          image="gcr.io/$GCP_PROJECT/$IMAGE:$TAG"
          echo ::set-output name=image_path::$image

      - name: Notify Slack of Container Build
        id: slack
        uses: slackapi/slack-github-action@v1.19.0
        with:
          channel-id: '#notifications'  # Slack channel id or name to post message. https://api.slack.com/methods/chat.postMessage#channels
          slack-message: "Just Pushed to gcr.io/${{ env.GCP_PROJECT }}/${{ env.IMAGE }}:${{ env.TAG }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  build-and-push-to-gcr-beta:
    runs-on: ubuntu-latest
    outputs:
      image_path: ${{ steps.publish-beta.outputs.image_path }}
    steps:
      - uses: actions/checkout@v2 
      - id: 'auth-runwhen'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v0.4.0'
        with:
          workload_identity_provider: ${{ secrets.RUNWHEN_BETA_WI_PROVIDER }}
          service_account: ${{ secrets.RUNWHEN_BETA_WI_SA }}

      - name: Configure docker for GCP
        run: gcloud --quiet auth configure-docker
      
      - name: Set tag to branch name
        run: |-
          echo "TAG=$(echo $GITHUB_REF_NAME | sed 's/[^a-zA-Z0-9]/-/g')" >> $GITHUB_ENV

    # Build the Docker image
      - name: Build
        run: |-
          docker build \
            --tag "gcr.io/$GCP_PROJECT/$IMAGE:$TAG" \
            --build-arg GITHUB_SHA="$GITHUB_SHA" \
            --build-arg GITHUB_REF="$GITHUB_REF" \
            -f Dockerfile .           

      - name: Configure docker for GCP
        run: gcloud --quiet auth configure-docker

      # Push the Docker image to BETA Google Container Registry
      - name: Publish BETA
        id: publish-beta
        run: |-
          docker push "gcr.io/$GCP_PROJECT/$IMAGE:$TAG"
   
      - name: Notify Slack of Container Build
        id: slack-beta
        uses: slackapi/slack-github-action@v1.19.0
        with:
          channel-id: '#notifications'  # Slack channel id or name to post message. https://api.slack.com/methods/chat.postMessage#channels
          slack-message: 'Just Pushed to gcr.io/${{ env.GCP_PROJECT }}/${{ env.IMAGE }}:${{ env.TAG }}'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        
