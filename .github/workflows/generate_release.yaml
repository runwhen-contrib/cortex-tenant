name: Generate Release

# Manual release pipeline for cortex-tenant.
#
# Cuts a date-based release tag (YYYY-MM-DD.N), pushes the built image
# to ghcr.io/runwhen-contrib/cortex-tenant:<TAG> AND :latest, and
# creates a GitHub Release with auto-generated notes. Mirrors the
# release-tag scheme used by agentfarm / usearch / 468-platform /
# runwhen-runner so the rwlight-helm chart's image-tag updater can
# treat cortex-tenant identically to every other first-party RunWhen
# image (date sort → take newest).
#
# Trigger: workflow_dispatch only. Maintainers run this when ready to
# ship a release; the continuous build-and-push.yaml workflow stops at
# `main-<sha>` so accidental pushes never produce release-shaped tags.

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: >-
          Optional suffix appended to the date tag (e.g. "rc1" produces
          2026-05-20.1-rc1 instead of 2026-05-20.1). Leave blank for a
          normal release.
        type: string
        required: false
        default: ""

permissions:
  contents: write    # create-release + push tag
  packages: write    # push image to ghcr.io
  id-token: write    # for future SLSA provenance attestation

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: runwhen-contrib/cortex-tenant

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.create_tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # need full tag history to compute next .N

      - name: Compute next date-based tag
        id: create_tag
        # Tag scheme: YYYY-MM-DD.N where N starts at 1 and increments
        # for each release cut on the same calendar day. Matches the
        # convention used by every other RunWhen first-party release
        # pipeline so update-image-tags-from-self-hosted-release.sh in
        # the rwlight-helm chart picks up cortex-tenant releases with
        # zero special-casing.
        run: |
          set -euo pipefail
          DATE="$(date -u +%Y-%m-%d)"
          SUFFIX=""
          [ -n "${{ inputs.tag_suffix }}" ] && SUFFIX="-${{ inputs.tag_suffix }}"

          # Find the highest .N already used today (across both bare
          # and suffix forms) so we never collide with an earlier cut.
          LAST_N=$(git tag --list "${DATE}.*" "${DATE}.*-*" \
            | sed -E "s|^${DATE}\.([0-9]+).*|\1|" \
            | sort -n | tail -1)
          if [ -z "${LAST_N}" ]; then
            NEXT_N=1
          else
            NEXT_N=$((LAST_N + 1))
          fi

          TAG="${DATE}.${NEXT_N}${SUFFIX}"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Cutting release: ${TAG}"

      - name: Configure git author
        run: |
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config user.name  "${GITHUB_ACTOR}"

      - name: Push git tag
        env:
          TAG: ${{ steps.create_tag.outputs.release_tag }}
        run: |
          git tag "${TAG}"
          git push origin "${TAG}"

  build-and-push-release:
    needs: tag-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag-and-release.outputs.release_tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      # Tests run again at the exact tagged commit — defensive, since
      # the tag created above could in principle be on a different SHA
      # than the workflow's commit if someone races a push to main
      # between dispatch and this step.
      - name: go test
        run: go test -race -timeout 120s ./...

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          # Always push both the immutable date tag AND `latest`. The
          # rwlight-helm chart pins to a specific date tag in
          # values.yaml; `latest` is only for ad-hoc `docker run`
          # convenience and is intentionally NOT used by any chart.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.tag-and-release.outputs.release_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.tag-and-release.outputs.release_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            GITHUB_SHA=${{ github.sha }}
            GITHUB_REF=refs/tags/${{ needs.tag-and-release.outputs.release_tag }}

  github-release:
    needs: [tag-and-release, build-and-push-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag-and-release.outputs.release_tag }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          gh release create "${TAG}" \
            --title "cortex-tenant ${TAG}" \
            --generate-notes \
            --notes "
          ## Image

          \`\`\`
          ${IMAGE}:${TAG}
          \`\`\`

          ### Pull

          \`\`\`bash
          docker pull ${IMAGE}:${TAG}
          \`\`\`
          "
